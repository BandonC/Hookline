name = "hookline-api"
main = "src/index.ts"
compatibility_date = "2026-01-01"
compatibility_flags = ["nodejs_compat"]

# ── D1 database ───────────────────────────────────────────────
# database_id is generated by `wrangler d1 create hookline-db`.
# It is account-specific and CANNOT be known ahead of time — paste the
# value the command prints. It is not a secret; it belongs in this file.
[[d1_databases]]
binding = "DB"
database_name = "hookline-db"
database_id = "368382b0-2191-4b64-abcc-88d4d7a990b1"
# Migrations are defined in @hookline/db (drizzle-kit writes them there) and
# applied from here. Point Wrangler at that package's migrations directory.
migrations_dir = "../db/migrations"

# ── Per-endpoint Durable Object ───────────────────────────────
# Scheduling + delivery in v1; ordering/breaker in v2.
[[durable_objects.bindings]]
name = "ENDPOINT_DO"
class_name = "EndpointDO"

# ── Coordinator Durable Object (v2 fair scheduling) ───────────
# Single instance (idFromName("scheduler")). Per-tenant credit/in-flight
# ledger; gates every delivery via /acquire and /release.
[[durable_objects.bindings]]
name = "SCHEDULER_DO"
class_name = "SchedulerDO"

# ── Per-endpoint ingestion rate limiter ───────────────────────
# One instance per endpoint (idFromName(endpointId)). Token-bucket gate on
# POST /v1/events — a defensive cap so a compromised publisher can't flood.
[[durable_objects.bindings]]
name = "INGEST_LIMITER"
class_name = "IngestLimiterDO"

# SQLite-backed DO class = the free-tier one. Do NOT use new_classes
# (that's the paid KV-backed variant). See packages/api/CLAUDE.md.
[[migrations]]
tag = "v1"
new_sqlite_classes = ["EndpointDO"]

[[migrations]]
tag = "v2-scheduler"
new_sqlite_classes = ["SchedulerDO"]

[[migrations]]
tag = "v3-ingest-limiter"
new_sqlite_classes = ["IngestLimiterDO"]

# ── Reconciliation cron (at-least-once backstop, NOT primary delivery) ──
# Low frequency on purpose. Re-pokes DOs for stuck `pending` events.
[triggers]
crons = ["*/5 * * * *"]
